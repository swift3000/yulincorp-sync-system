name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 之类的 tag 时自动触发
  workflow_dispatch:   # 也可手动在 GitHub Actions 页面点击触发

jobs:
  build-windows-x64:
    name: Windows 64-bit
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain (64-bit)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows x64 installer
        run: cargo tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yulincorp-sync-system-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-windows-x86:
    name: Windows 32-bit
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain (32-bit)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows x86 installer
        run: cargo tauri build --target i686-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload x86 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yulincorp-sync-system-windows-x86
          path: |
            src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: [build-windows-x64, build-windows-x86]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: yulincorp-sync-system-windows-x64
          path: ./release-x64

      - name: Download x86 artifacts
        uses: actions/download-artifact@v4
        with:
          name: yulincorp-sync-system-windows-x86
          path: ./release-x86

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 陕西昱霖协同管理系统 ${{ github.ref_name }}
          body: |
            ## 下载说明
            - **64位系统**（Win10/Win11 x64，推荐）：下载 `*-x64*` 文件
            - **32位系统**（Win7/Win10 x86）：下载 `*-x86*` 文件
            
            ### 安装方式
            - `.msi` 文件：静默安装，支持企业批量部署
            - `.exe` 文件（NSIS）：向导式安装，适合普通用户
          files: |
            release-x64/*
            release-x86/*
          draft: false
          prerelease: false
